name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast:
    name: Fast tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test extras
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Run unit + plugin tests
        run: pytest -v -m "not slow"

  slow:
    name: Slow integration test (Python 3.12)
    runs-on: ubuntu-latest
    needs: fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and test extras
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Run slow control test
        run: pytest -v -m slow --timeout=1200
